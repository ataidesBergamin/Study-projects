<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="lista.css" />
  </head>
  <body>
    <h1>Lista de Tarefas</h1>
    <br />
    <div id="entrada">
      <label for="entradaTarefa">Digite uma nova tarefa:</label>
      <input type="text" id="entradaTarefa" />
      <button id="add">Adicionar Tarefa</button>
    </div>
    <section id="tarefas">
      <div class="boxlist">
        <div>
          <div class="sub-title"><h2>Tarefas Pendentes</h2></div>

          <ul id="adicionarTarefas"></ul>
        </div>
        <div class="buttons">
          <button id="select1">Selecionar Tarefa</button>
          <!-- done =  finalizada -->
          <button id="done">Marcar como finalizada</button>
        </div>
      </div>
      <div class="boxlist">
        <div>
          <div class="sub-title"><h2>Tarefas Finalizadas</h2></div>
          <ul id="tarefasFinalizadas"></ul>
        </div>
        <div class="buttons">
          <button id="select2">Selecionar Tarefa</button>
          <button id="remov">Remover Tarefa Finalizada</button>
        </div>
      </div>
    </section>
    <script src="lista.js"></script>
  </body>
</html>
